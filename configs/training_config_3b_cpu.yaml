# RLVR Training Configuration — Qwen2.5-3B-Instruct on CPU
# Uses synthetic tasks (~50) + representative episodes (~8) = ~61 prompts total

model:
  name: "Qwen/Qwen2.5-3B-Instruct"
  dtype: "float32"
  load_in_4bit: false                    # bitsandbytes requires CUDA

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]

grpo:
  num_generations: 2
  max_completion_length: 128
  temperature: 0.7
  beta: 0.04
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 5.0e-6
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  optimizer: "adamw_torch"
  bf16: false
  logging_steps: 1
  save_steps: 100
  seed: 42

reward:
  task_completion_weight: 1.0
  policy_compliance_weight: 0.5
  efficiency_weight: 0.2
  format_weight: 0.3

environment:
  domain: "retail"
  task_split: "train"
  max_turns: 15
  user_llm: "gpt-4o-mini"

wandb:
  project: null
  entity: null
