# RLVR Training Configuration — Optimized for NVIDIA L4 (24GB)
# Framework: TRL (GRPO)
# Benchmark: τ²-bench (retail domain)

model:
  name: "Qwen/Qwen2.5-3B-Instruct"
  dtype: "bfloat16"
  load_in_4bit: true

lora:
  r: 32                   # Reduced from 64 to save memory on L4
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

grpo:
  num_generations: 2          # Reduced from 4 to fit L4 memory and train faster
  max_prompt_length: 2048     # Reduced — our prompts are ~500-800 tokens
  max_completion_length: 512  # Reduced — agent responses are ~100-300 tokens
  temperature: 0.7
  beta: 0.04
  num_train_epochs: 3
  per_device_train_batch_size: 2   # L4 can handle batch=2 with these seq lengths
  gradient_accumulation_steps: 4   # Effective batch = 8
  learning_rate: 5.0e-6
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  optimizer: "adamw_torch"
  bf16: true
  logging_steps: 1
  save_steps: 25
  seed: 42

reward:
  task_completion_weight: 1.0
  policy_compliance_weight: 0.5
  efficiency_weight: 0.2
  format_weight: 0.3

environment:
  domain: "retail"
  task_split: "train"
  max_turns: 15
  user_llm: "gpt-4o-mini"

wandb:
  project: null    # Set to "afterquery-rlvr" if you have wandb configured
  entity: null
