# RLVR Training Configuration for τ²-bench
# Framework: TRL (GRPO)
# Benchmark: τ²-bench (retail domain)

model:
  name: "Qwen/Qwen2.5-3B-Instruct"
  dtype: "bfloat16"
  load_in_4bit: true   # QLoRA for memory efficiency

lora:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

grpo:
  num_generations: 4          # K completions per prompt (group size)
  max_prompt_length: 4096     # Max tokens for conversation context
  max_completion_length: 1024 # Max tokens for agent response
  temperature: 0.7            # Sampling temperature for generations
  beta: 0.04                  # KL penalty coefficient
  num_train_epochs: 3
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-6
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  optimizer: "adamw_torch"
  bf16: true
  logging_steps: 5
  save_steps: 50
  seed: 42

reward:
  task_completion_weight: 1.0    # Primary: did the agent solve the task?
  policy_compliance_weight: 0.5  # Secondary: did it follow domain rules?
  efficiency_weight: 0.2         # Tertiary: fewer turns = better
  format_weight: 0.3             # Tool call format correctness

environment:
  domain: "retail"               # tau2-bench domain
  task_split: "train"            # Use train split for RL
  max_turns: 15                  # Max conversation turns per episode
  user_llm: "gpt-4o-mini"       # User simulator model

wandb:
  project: "afterquery-rlvr"
  entity: null
